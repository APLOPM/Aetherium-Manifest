<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHERIUM Light Control Kernel v4</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --void-bg: #010102;
      --glass-bg: rgba(10, 10, 12, 0.88);
      --text: #e5e7eb;
      --muted: #6b7280;
      --blue: #00e5ff;
      --pink: #ff0055;
      --gold: #ffd166;
      --green: #4ade80;
      --crimson: #dc2626;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }

    canvas#display-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: 390px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .section-title {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.5;
      outline: none;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
    }

    .full { grid-column: 1 / -1; }

    .schema-box {
      max-height: 240px;
      overflow: auto;
      font-size: 10px;
      line-height: 1.45;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
      user-select: text;
    }
  </style>
</head>
<body>
  <canvas id="display-layer"></canvas>

  <div id="hud">
    <div class="section-title">Aetherium Light Control Kernel v4</div>

    <div class="section-title">User Request</div>
    <textarea id="txt-request">สร้างรูปทรงเกลียวสีทองอมม่วง ค่อยๆ ลอยขึ้นอย่างสงบ เหมือน AI กำลังคิดอย่างลึกซึ้ง</textarea>

    <div class="btn-grid">
      <button id="btn-run">RUN REQUEST</button>
      <button id="btn-reset">RESET VOID</button>
      <button class="full" id="btn-schema">SHOW CURRENT LCL</button>
    </div>

    <div style="margin-top: 16px" class="section-title">LCL</div>
    <div class="schema-box" id="schema-view">Press RUN to generate LCL</div>
  </div>

  <script type="module">
    import { AetheriumKernel } from './kernel.js';

    const canvas = document.getElementById('display-layer');
    const schemaView = document.getElementById('schema-view');
    const txtRequest = document.getElementById('txt-request');
    
    // --- Kernel Initialization ---
    const kernel = new AetheriumKernel({
      canvas: canvas,
      // IMPORTANT: Replace with your actual backend endpoint
      apiBaseUrl: 'http://localhost:8000', 
      // IMPORTANT: Replace with the URL serving your formation manifest
      formationBaseUrl: '.', 
      evaluatorMode: 'local', // Use local evaluator for now
    });
    
    const resizeObserver = new ResizeObserver(entries => {
        const { width, height } = entries[0].contentRect;
        kernel.resize(width, height);
    });
    resizeObserver.observe(canvas);
    kernel.resize(canvas.clientWidth, canvas.clientHeight);
    
    kernel.start();

    // --- UI Wiring ---
    document.getElementById('btn-run').addEventListener('click', async () => {
      schemaView.textContent = 'Interpreting with LLM...';
      await kernel.handleUserLightRequest(txtRequest.value);
      const lcl = kernel.getLCLSchema();
      schemaView.textContent = lcl ? JSON.stringify(lcl, null, 2) : 'Failed to generate LCL.';
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      kernel.resetToVoid();
      schemaView.textContent = 'Kernel reset. Ready for new request.';
      txtRequest.value = 'สร้างรูปทรงเกลียวสีทองอมม่วง ค่อยๆ ลอยขึ้นอย่างสงบ เหมือน AI กำlingคิดอย่างลึกซึ้ง';
    });
    
    document.getElementById('btn-schema').addEventListener('click', () => {
        const lcl = kernel.getLCLSchema();
        if (lcl) {
            schemaView.textContent = JSON.stringify(lcl, null, 2);
        } else {
            schemaView.textContent = 'No LCL has been generated yet. Run a request first.';
        }
    });

  </script>
</body>
</html>
